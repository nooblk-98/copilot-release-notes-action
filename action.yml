name: AI Automatic Release Notes
description: Generate and publish AI-powered GitHub release titles and notes using GitHub Copilot.
author: lahiru
branding:
  icon: file-text
  color: blue

inputs:
  github_token:
    description: GitHub token with contents:write permission.
    required: true
  copilot_model:
    description: Copilot model for generation.
    required: false
    default: gpt-4o
  tag_name:
    description: Release tag to update. If empty, latest tag is used.
    required: false
  target_commitish:
    description: Target commit SHA or branch for the release.
    required: false

outputs:
  release_title:
    description: Generated or fallback release title.
    value: ${{ steps.export.outputs.release_title }}
  release_notes:
    description: Generated or fallback release notes markdown.
    value: ${{ steps.export.outputs.release_notes }}

runs:
  using: composite
  steps:
    - name: Ensure required tools are available
      shell: bash
      run: |
        set -euo pipefail
        for cmd in python3 git; do
          if ! command -v "$cmd" >/dev/null 2>&1; then
            echo "Missing required command: $cmd"
            exit 1
          fi
        done

    - name: Prepare release context
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        RELEASE_TAG: ${{ inputs.tag_name }}
        RELEASE_TARGET: ${{ inputs.target_commitish }}
      run: python3 "${GITHUB_ACTION_PATH}/scripts/release/01_prepare_context.py"

    - name: Build change summary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: python3 "${GITHUB_ACTION_PATH}/scripts/release/02_build_change_summary.py"

    - name: Generate release notes
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        COPILOT_MODEL: ${{ inputs.copilot_model }}
      run: python3 "${GITHUB_ACTION_PATH}/scripts/release/03_generate_release_notes.py"

    - name: Generate release title
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        COPILOT_MODEL: ${{ inputs.copilot_model }}
      run: python3 "${GITHUB_ACTION_PATH}/scripts/release/04_generate_release_title.py"

    - name: Update release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: python3 "${GITHUB_ACTION_PATH}/scripts/release/05_update_release.py"

    - name: Export outputs
      id: export
      shell: bash
      run: |
        set -euo pipefail
        title_file="/tmp/release-title.txt"
        notes_file="/tmp/release-notes.md"

        if [[ ! -f "$title_file" || ! -f "$notes_file" ]]; then
          echo "Expected output files not found."
          exit 1
        fi

        {
          echo "release_title=$(cat "$title_file")"
          echo "release_notes<<EOF"
          cat "$notes_file"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

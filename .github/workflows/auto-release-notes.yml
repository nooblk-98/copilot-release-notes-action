name: Example - AI Auto Release Notes

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to update (example: v1.2.3)"
        required: true
        type: string
      target_commitish:
        description: "Target commit SHA or branch"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run marketplace action (local example)
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          openai_model: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
          target_commitish: ${{ github.event.release.target_commitish || inputs.target_commitish }}
